<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nomad OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   NOMAD OS v2.2 — Live Supabase Edition
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root[data-theme="dark"] {
  --bg:            #050f0f;
  --bg2:           #091414;
  --card-bg:       rgba(0,212,212,0.06);
  --card-hover:    rgba(0,212,212,0.13);
  --card-border:   rgba(0,212,212,0.2);
  --card-border-h: rgba(0,212,212,0.5);
  --text:          #b0f0f0;
  --text-strong:   #e0fafa;
  --text-dim:      rgba(176,240,240,0.55);
  --text-muted:    rgba(176,240,240,0.3);
  --teal:          #00d4d4;
  --scanline:      rgba(0,0,0,0.07);
  --header-bg:     #091414;
  --header-border: rgba(0,212,212,0.2);
  --status-bg:     #00d4d4;
  --status-fg:     #000000;
  --result-bg:     rgba(0,212,212,0.04);
  --scrollbar:     rgba(0,212,212,0.25);
  --tag-bg:        rgba(0,212,212,0.1);
  --tag-border:    rgba(0,212,212,0.3);
  --tag-text:      #00d4d4;
  --photo-bg:      rgba(0,212,212,0.06);
  --badge-live:    #4caf50;
  --badge-dev:     #ff9800;
  --badge-plan:    rgba(176,240,240,0.3);
}

:root[data-theme="light"] {
  --bg:            #ffffff;
  --bg2:           #f5f5f5;
  --card-bg:       #f9f9f9;
  --card-hover:    #f0f0f0;
  --card-border:   #e0e0e0;
  --card-border-h: #0d8182;
  --text:          #1a1a1a;
  --text-strong:   #000000;
  --text-dim:      #555555;
  --text-muted:    #999999;
  --teal:          #0d8182;
  --scanline:      rgba(0,0,0,0.025);
  --header-bg:     #0d8182;
  --header-border: #0a6b6c;
  --status-bg:     #0d8182;
  --status-fg:     #ffffff;
  --result-bg:     #f9f9f9;
  --scrollbar:     #cccccc;
  --tag-bg:        #f0f0f0;
  --tag-border:    #dddddd;
  --tag-text:      #555555;
  --photo-bg:      #f0f0f0;
  --badge-live:    #2e7d32;
  --badge-dev:     #e65100;
  --badge-plan:    #999999;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  color: var(--text);
  display: flex;
  flex-direction: column;
  transition: background 0.25s, color 0.25s;
  position: relative;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
  pointer-events: none;
  z-index: 9998;
}

/* ---- HEADER ---- */
.header {
  background: var(--header-bg);
  border-bottom: 1px solid var(--header-border);
  height: 34px; min-height: 34px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; flex-shrink: 0; z-index: 10;
}

.prompt { display: flex; align-items: center; font-size: 11px; white-space: nowrap; }

[data-theme="dark"] .p-user  { color: #b0f0f0; font-weight: 700; }
[data-theme="dark"] .p-at    { color: rgba(176,240,240,0.5); }
[data-theme="dark"] .p-host  { color: #ffb347; font-weight: 700; }
[data-theme="dark"] .p-path  { color: rgba(176,240,240,0.5); }
[data-theme="dark"] .cursor  { background: #00d4d4; }
[data-theme="light"] .p-user  { color: #ffffff; font-weight: 700; }
[data-theme="light"] .p-at    { color: rgba(255,255,255,0.6); }
[data-theme="light"] .p-host  { color: #ffe0a0; font-weight: 700; }
[data-theme="light"] .p-path  { color: rgba(255,255,255,0.6); }
[data-theme="light"] .cursor  { background: #ffffff; }

.cursor {
  display: inline-block; width: 7px; height: 12px;
  margin-left: 3px; vertical-align: middle;
  animation: blink 1.1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.header-controls { display: flex; align-items: center; gap: 7px; }

.lang-switch { display: flex; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; overflow: hidden; }
.lang-btn {
  padding: 2px 8px; font-size: 9px; font-weight: 700; font-family: inherit;
  letter-spacing: 0.5px; cursor: pointer; background: transparent;
  color: rgba(255,255,255,0.6); border: none; transition: all 0.15s;
}
.lang-btn.active { background: rgba(255,255,255,0.9); color: var(--header-bg); }

.theme-btn {
  width: 24px; height: 24px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.3); background: transparent;
  color: rgba(255,255,255,0.8); font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-family: inherit;
}
.theme-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

.clock { font-size: 10px; color: rgba(255,255,255,0.7); font-variant-numeric: tabular-nums; min-width: 32px; text-align: right; }

/* ---- DESKTOP ---- */
.desktop { flex: 1; overflow-y: auto; padding: 12px; scrollbar-width: thin; scrollbar-color: var(--scrollbar) transparent; }

.dir-header {
  font-size: 8px; font-weight: 700; color: var(--text-muted);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.dir-header::after { content: ''; flex: 1; height: 1px; background: var(--card-border); }

.app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
@media (max-width: 360px) { .app-grid { grid-template-columns: repeat(2, 1fr); } }

.app-tile {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 10px; padding: 12px 8px 10px;
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  cursor: pointer; transition: all 0.18s; position: relative;
  overflow: hidden; user-select: none;
}
.app-tile:hover { background: var(--card-hover); border-color: var(--card-border-h); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
.app-tile:active { transform: scale(0.97); box-shadow: none; }

.tile-icon {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.tile-icon svg { width: 24px; height: 24px; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; fill: none; }

/* Dark mode tile colors */
.app-tile[data-app="projekte"]    .tile-icon { background: linear-gradient(135deg, #1a3a1a, #2d6a2d); }
.app-tile[data-app="projekte"]    .tile-icon svg { stroke: #6fcf6f; }
.app-tile[data-app="referenzen"]  .tile-icon { background: linear-gradient(135deg, #3a2000, #7a4500); }
.app-tile[data-app="referenzen"]  .tile-icon svg { stroke: #ffb347; }
.app-tile[data-app="photos"]      .tile-icon { background: linear-gradient(135deg, #3a0a0a, #7a1a1a); }
.app-tile[data-app="photos"]      .tile-icon svg { stroke: #ff7070; }
.app-tile[data-app="privat"]      .tile-icon { background: linear-gradient(135deg, #1a0a3a, #3a1a7a); }
.app-tile[data-app="privat"]      .tile-icon svg { stroke: #b070ff; }
.app-tile[data-app="tools"]       .tile-icon { background: linear-gradient(135deg, #0a1a3a, #1a3a7a); }
.app-tile[data-app="tools"]       .tile-icon svg { stroke: #70b0ff; }
.app-tile[data-app="links"]       .tile-icon { background: linear-gradient(135deg, #2a2000, #5a4500); }
.app-tile[data-app="links"]       .tile-icon svg { stroke: #ffd060; }
.app-tile[data-app="youtube"]     .tile-icon { background: linear-gradient(135deg, #3a0a0a, #8a1a00); }
.app-tile[data-app="youtube"]     .tile-icon svg { stroke: #ff4444; }
.app-tile[data-app="notebooklm"]  .tile-icon { background: linear-gradient(135deg, #0a1a0a, #1a4a2a); }
.app-tile[data-app="notebooklm"]  .tile-icon svg { stroke: #4caf50; }
.app-tile[data-app="camp"]        .tile-icon { background: linear-gradient(135deg, #1a1000, #3a2800); }
.app-tile[data-app="camp"]        .tile-icon svg { stroke: #ffb347; }
.app-tile[data-app="preise"]      .tile-icon { background: linear-gradient(135deg, #0a2a1a, #1a5a2a); }
.app-tile[data-app="preise"]      .tile-icon svg { stroke: #50e3a4; }

/* Light mode tile colors */
[data-theme="light"] .app-tile[data-app="projekte"]   .tile-icon { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
[data-theme="light"] .app-tile[data-app="projekte"]   .tile-icon svg { stroke: #2e7d32; }
[data-theme="light"] .app-tile[data-app="referenzen"] .tile-icon { background: linear-gradient(135deg, #fff3e0, #ffe0b2); }
[data-theme="light"] .app-tile[data-app="referenzen"] .tile-icon svg { stroke: #e65100; }
[data-theme="light"] .app-tile[data-app="photos"]     .tile-icon { background: linear-gradient(135deg, #fce4ec, #f8bbd0); }
[data-theme="light"] .app-tile[data-app="photos"]     .tile-icon svg { stroke: #c62828; }
[data-theme="light"] .app-tile[data-app="privat"]     .tile-icon { background: linear-gradient(135deg, #ede7f6, #d1c4e9); }
[data-theme="light"] .app-tile[data-app="privat"]     .tile-icon svg { stroke: #4527a0; }
[data-theme="light"] .app-tile[data-app="tools"]      .tile-icon { background: linear-gradient(135deg, #e3f2fd, #bbdefb); }
[data-theme="light"] .app-tile[data-app="tools"]      .tile-icon svg { stroke: #0d47a1; }
[data-theme="light"] .app-tile[data-app="links"]      .tile-icon { background: linear-gradient(135deg, #fffde7, #fff9c4); }
[data-theme="light"] .app-tile[data-app="links"]      .tile-icon svg { stroke: #f57f17; }
[data-theme="light"] .app-tile[data-app="youtube"]    .tile-icon { background: linear-gradient(135deg, #fce4ec, #ffcdd2); }
[data-theme="light"] .app-tile[data-app="youtube"]    .tile-icon svg { stroke: #c62828; }
[data-theme="light"] .app-tile[data-app="notebooklm"] .tile-icon { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
[data-theme="light"] .app-tile[data-app="notebooklm"] .tile-icon svg { stroke: #2e7d32; }
[data-theme="light"] .app-tile[data-app="camp"]       .tile-icon { background: linear-gradient(135deg, #fff8e1, #ffecb3); }
[data-theme="light"] .app-tile[data-app="camp"]       .tile-icon svg { stroke: #e65100; }
[data-theme="light"] .app-tile[data-app="preise"]     .tile-icon { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
[data-theme="light"] .app-tile[data-app="preise"]     .tile-icon svg { stroke: #1b5e20; }

.tile-name { font-size: 10px; font-weight: 700; color: var(--text-strong); letter-spacing: 0.3px; text-align: center; }
.tile-sub  { font-size: 8px; color: var(--text-dim); text-align: center; margin-top: -3px; line-height: 1.3; }

/* ---- APP WINDOW ---- */
.app-window {
  display: none; position: absolute; inset: 34px 0 22px 0;
  background: var(--bg); z-index: 100; flex-direction: column;
  animation: termOpen 0.16s ease;
}
.app-window.open { display: flex; }
@keyframes termOpen { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }

.win-bar {
  background: var(--bg2); border-bottom: 1px solid var(--card-border);
  height: 32px; min-height: 32px; display: flex; align-items: center;
  padding: 0 12px; gap: 10px; flex-shrink: 0;
}
.back-btn {
  color: var(--teal); cursor: pointer; font-size: 9px; font-weight: 700;
  letter-spacing: 0.5px; padding: 3px 8px; border: 1px solid var(--card-border);
  border-radius: 3px; background: transparent; font-family: inherit;
  transition: all 0.15s; white-space: nowrap;
}
.back-btn:hover { background: var(--card-hover); border-color: var(--teal); }
.win-title { font-size: 9px; color: var(--text-dim); letter-spacing: 0.8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.win-content { flex: 1; overflow-y: auto; padding: 12px; scrollbar-width: thin; scrollbar-color: var(--scrollbar) transparent; }

/* ---- CONTENT COMPONENTS ---- */
.term-line { font-size: 9px; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 0.3px; }
.term-line .cmd { color: var(--teal); font-weight: 600; }

.result-card {
  background: var(--result-bg); border: 1px solid var(--card-border);
  border-left: 2px solid var(--teal); border-radius: 0 6px 6px 0;
  padding: 10px 12px; margin-bottom: 8px; transition: background 0.15s;
}
.result-card:hover { background: var(--card-hover); }

.win-content[data-app="projekte"]   .result-card { border-left-color: #4caf50; }
.win-content[data-app="referenzen"] .result-card { border-left-color: #ff9800; }
.win-content[data-app="photos"]     .result-card { border-left-color: #f44336; }
.win-content[data-app="privat"]     .result-card { border-left-color: #9c27b0; }
.win-content[data-app="tools"]      .result-card { border-left-color: #2196f3; }
.win-content[data-app="links"]      .result-card { border-left-color: #fdd835; }
.win-content[data-app="youtube"]    .result-card { border-left-color: #f44336; }
.win-content[data-app="notebooklm"] .result-card { border-left-color: #4caf50; }
.win-content[data-app="camp"]       .result-card { border-left-color: #ff9800; }

.rc-name { font-size: 11px; font-weight: 700; color: var(--text-strong); margin-bottom: 4px; letter-spacing: 0.2px; }
.rc-desc { font-size: 10px; color: var(--text-dim); line-height: 1.65; }
.rc-link {
  display: inline-block; margin-top: 7px; font-size: 9px; color: var(--teal);
  text-decoration: none; border-bottom: 1px solid var(--card-border);
  letter-spacing: 0.3px; transition: border-color 0.15s; font-weight: 600;
}
.rc-link:hover { border-color: var(--teal); }

.tag {
  display: inline-block; background: var(--tag-bg); border: 1px solid var(--tag-border);
  border-radius: 3px; padding: 1px 6px; font-size: 8px; margin: 4px 2px 0 0;
  color: var(--tag-text); letter-spacing: 0.5px; font-weight: 600;
}

.badge {
  display: inline-block; border-radius: 3px; padding: 1px 6px;
  font-size: 8px; font-weight: 700; letter-spacing: 0.5px; margin-left: 6px;
  vertical-align: middle;
}
.badge-live { background: rgba(76,175,80,0.15); color: var(--badge-live); border: 1px solid rgba(76,175,80,0.3); }
.badge-dev  { background: rgba(255,152,0,0.15); color: var(--badge-dev); border: 1px solid rgba(255,152,0,0.3); }
.badge-plan { background: rgba(176,240,240,0.08); color: var(--badge-plan); border: 1px solid rgba(176,240,240,0.15); }
.badge-wip  { background: rgba(255,152,0,0.15); color: #ff9800; border: 1px solid rgba(255,152,0,0.3); }

.loading {
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; color: var(--text-dim); padding: 16px 0;
}
.loading-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--teal);
  animation: loadpulse 1s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes loadpulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }

.error-msg { font-size: 10px; color: #ff5555; padding: 8px 0; }

/* Photo grid */
.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 6px; }
.photo-placeholder {
  aspect-ratio: 1; background: var(--photo-bg); border: 1px solid var(--card-border);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: var(--text-muted);
}
.photo-card {
  position: relative; cursor: pointer; border-radius: 6px; overflow: hidden;
  border: 1px solid var(--card-border); aspect-ratio: 1; background: var(--photo-bg);
  transition: border-color 0.2s, transform 0.15s;
}
.photo-card:hover { border-color: var(--teal); transform: scale(1.02); }
.photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-card .photo-overlay {
  position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 55%);
  opacity: 0; transition: opacity 0.2s; display: flex; align-items: flex-end; padding: 6px;
}
.photo-card:hover .photo-overlay { opacity: 1; }
.photo-overlay .photo-title { font-size: 8px; color: #fff; font-weight: 600; line-height: 1.3; }
.photo-filter-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.photo-filter {
  font-size: 8px; padding: 2px 7px; border-radius: 3px; border: 1px solid var(--card-border);
  background: transparent; color: var(--text-dim); cursor: pointer; font-family: inherit;
  transition: all 0.15s; letter-spacing: 0.3px;
}
.photo-filter:hover, .photo-filter.active { background: var(--teal); color: #000; border-color: var(--teal); }
.photo-lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 999;
  display: none; flex-direction: column; align-items: center; justify-content: center; padding: 16px;
}
.photo-lightbox.open { display: flex; }
.photo-lightbox img { max-width: 100%; max-height: 70vh; object-fit: contain; border-radius: 6px; }
.photo-lightbox .lb-title { color: #fff; font-size: 11px; font-weight: 700; margin-top: 10px; }
.photo-lightbox .lb-desc { color: rgba(255,255,255,0.65); font-size: 9px; margin-top: 4px; text-align: center; max-width: 400px; }
.photo-lightbox .lb-close { position: absolute; top: 12px; right: 16px; color: #fff; font-size: 18px; cursor: pointer; background: none; border: none; font-family: inherit; }
.coming-soon { margin-top: 10px; font-size: 8px; color: var(--text-muted); letter-spacing: 0.5px; }
.perm-denied { color: #ff5555; font-weight: 700; }

/* Video embed */
.video-wrap {
  position: relative; width: 100%; padding-bottom: 56.25%;
  border-radius: 6px; overflow: hidden; margin: 8px 0;
  border: 1px solid var(--card-border);
}
.video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

/* Link groups */
.link-group-title {
  font-size: 8px; font-weight: 700; color: var(--text-muted);
  letter-spacing: 2px; text-transform: uppercase;
  margin: 12px 0 6px; padding-bottom: 4px;
  border-bottom: 1px solid var(--card-border);
}
.link-group-title:first-child { margin-top: 0; }

/* Affiliate badge */
.aff-badge {
  display: inline-block; font-size: 7px; font-weight: 700;
  background: rgba(255,179,71,0.15); color: #ffb347;
  border: 1px solid rgba(255,179,71,0.3); border-radius: 3px;
  padding: 1px 5px; margin-left: 6px; letter-spacing: 0.5px;
  vertical-align: middle;
}

/* ---- STATUS BAR ---- */
.statusbar {
  background: var(--status-bg); height: 22px; min-height: 22px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; font-size: 8px; color: var(--status-fg);
  font-weight: 700; letter-spacing: 0.5px; flex-shrink: 0; z-index: 10;
  transition: background 0.25s, color 0.25s;
}
.sb-dot {
  display: inline-block; width: 5px; height: 5px; border-radius: 50%;
  background: currentColor; margin-right: 5px;
  animation: pulse 2s infinite; vertical-align: middle;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="prompt">
    <span class="p-user">nomad</span><span class="p-at">@</span><span class="p-host">holo-verse</span><span class="p-path">:~/os$</span><span class="cursor"></span>
  </div>
  <div class="header-controls">
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('de')">DE</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☾</button>
    <span class="clock" id="clock">--:--</span>
  </div>
</div>

<!-- DESKTOP -->
<div class="desktop" id="desktop">
  <div class="dir-header" data-de="VERZEICHNIS · ~/os/" data-en="DIRECTORY · ~/os/">VERZEICHNIS · ~/os/</div>
  <div class="app-grid">

    <!-- Row 1 -->
    <div class="app-tile" data-app="projekte" onclick="openApp('projekte')">
      <div class="tile-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C12 2 8 6 8 12H16C16 6 12 2 12 2Z"/><path d="M8 12L6 18H18L16 12"/><path d="M10 18V22M14 18V22"/><circle cx="12" cy="9" r="1.5"/></svg>
      </div>
      <span class="tile-name" data-de="projekte/" data-en="projects/">projekte/</span>
      <span class="tile-sub" data-de="Aktuelle Projekte" data-en="Current Projects">Aktuelle Projekte</span>
    </div>

const SB_HEADERS = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

let theme = 'dark';
let lang = 'de';

function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☾' : '☀';
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  document.querySelectorAll('[data-de]').forEach(el => {
    el.textContent = el.dataset[l] || el.dataset.de;
  });
  const win = document.getElementById('app-window');
  if (win.classList.contains('open') && win.dataset.currentApp) {
    renderApp(win.dataset.currentApp);
  }
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}
updateClock();
setInterval(updateClock, 15000);

async function sbFetch(table, params = '') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers: SB_HEADERS });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

function t(obj) {
  if (!obj) return '';
  if (typeof obj === 'string') return obj;
  return obj[lang] || obj['de'] || obj['en'] || '';
}

function loadingHTML() {
  return `<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div><span>Lade Daten...</span></div>`;
}

function statusBadge(status) {
  if (status === 'live') return `<span class="badge badge-live">LIVE</span>`;
  if (status === 'in_development') return `<span class="badge badge-dev">IN DEV</span>`;
  return `<span class="badge badge-plan">GEPLANT</span>`;
}

function tagsHTML(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(tag => `<span class="tag">${tag}</span>`).join('');
}

/* ============================================================
   REFERENZEN — chronologisch nach Ären
   ============================================================ */
async function renderReferenzen() {
  const content = document.getElementById('win-content');
  content.innerHTML = loadingHTML();
  try {
    const refs = await sbFetch('project_references', 'select=title,description_short,client,era,year_from,year_to,tags,external_url,visibility&order=sort_order&visibility=neq.hidden');
    const eraConfig = {
      starsystem: { de: '🚀 STARSYSTEM-Ära — KI, Chatbots & Beratung', en: '🚀 STARSYSTEM Era — AI, Chatbots & Consulting', period: '2022–heute' },
      raumzeit:   { de: '🌐 RaumZeit-Ära — VR/AR, 360° & Immersive Erlebnisse', en: '🌐 RaumZeit Era — VR/AR, 360° & Immersive Experiences', period: '2016–2022' },
      trigami:    { de: '⚡ Trigami-Ära — Kampagnen & Blog-Marketing', en: '⚡ Trigami Era — Campaigns & Blog Marketing', period: '2010–2015' },
    };
    const eraOrder = ['starsystem', 'raumzeit', 'trigami'];
    const grouped = {};
    for (const r of refs) {
      const era = r.era || 'raumzeit';
      if (!grouped[era]) grouped[era] = [];
      grouped[era].push(r);
    }
    let html = `<div class="term-line">$ <span class="cmd">cat ${lang==='de'?'referenzen':'references'}/chronik.md | sort -r</span></div>`;
    if (!refs.length) html += `<div class="result-card"><div class="rc-desc">${lang==='de'?'Keine Referenzen gefunden.':'No references found.'}</div></div>`;
    for (const era of eraOrder) {
      const items = grouped[era];
      if (!items || !items.length) continue;
      const cfg = eraConfig[era];
      html += `<div class="link-group-title">${cfg[lang] || cfg.de} <span style="font-weight:400;opacity:0.6">${cfg.period}</span></div>`;
      for (const r of items) {
        const period = r.year_from ? `${r.year_from}${r.year_to && r.year_to !== r.year_from ? '–'+r.year_to : ''}` : '';
        html += `
          <div class="result-card">
            <div class="rc-name">${t(r.title)}</div>
            ${t(r.description_short) ? `<div class="rc-desc">${t(r.description_short)}</div>` : ''}
            <div style="margin-top:5px;">
              ${r.client ? `<span class="tag">${r.client}</span>` : ''}
              ${period ? `<span class="tag">${period}</span>` : ''}
              ${tagsHTML(r.tags)}
            </div>
            ${r.external_url && r.visibility !== 'private' ? `<a class="rc-link" href="${r.external_url}" target="_blank" rel="noopener">→ ${lang==='de'?'Zum Projekt':'View Project'} ↗</a>` : ''}
          </div>`;
      }
    }
    content.innerHTML = html;
  } catch(e) {
    content.innerHTML = `<div class="error-msg">// Fehler: ${e.message}</div>`;
  }
}

/* ============================================================
   LINKS — aus Supabase
   ============================================================ */
async function renderLinks() {
  const content = document.getElementById('win-content');
  content.innerHTML = loadingHTML();
  try {
    const links = await sbFetch('starsystem_links', 'select=link_type,label,url,sort_order&is_public=eq.true&order=sort_order');
    let html = `<div class="term-line">$ <span class="cmd">cat links/bookmarks.txt</span></div>`;
    const groups = {};
    for (const l of links) {
      if (['impressum','datenschutz','kontakt'].includes(l.link_type)) continue;
      if (!groups[l.link_type]) groups[l.link_type] = [];
      groups[l.link_type].push(l);
    }
    const groupLabels = {
      website: { de: 'Websites & Projekte', en: 'Websites & Projects' },
      social:  { de: 'Social Media', en: 'Social Media' },
    };
    for (const [type, items] of Object.entries(groups)) {
      const label = groupLabels[type] ? t(groupLabels[type]) : type;
      html += `<div class="link-group-title">${label}</div>`;
      for (const l of items) {
        const cleanLabel = l.label.replace(/^\p{Emoji}\s*/u, '');
        const emoji = l.label.match(/^(\p{Emoji})/u)?.[1] || '';
        html += `
          <div class="result-card">
            <div class="rc-name">${emoji ? emoji+' ' : ''}${cleanLabel}</div>
            <a class="rc-link" href="${l.url}" target="_blank" rel="noopener">→ ${l.url.replace('https://','').replace('http://','').split('/')[0]} ↗</a>
          </div>`;
      }
    }
    content.innerHTML = html;
  } catch(e) {
    content.innerHTML = `<div class="error-msg">// Fehler: ${e.message}</div>`;
  }
}

   ============================================================ */
function renderPhotos() {
  const cats = {
    all:        { de: 'Alle', en: 'All' },
    'nomad-life': { de: 'Nomad Life', en: 'Nomad Life' },
    nature:     { de: 'Natur', en: 'Nature' },
    odin:       { de: 'Odin', en: 'Odin' },
    work:       { de: 'Work', en: 'Work' },
    'ai-art':   { de: 'AI Art', en: 'AI Art' },
    events:     { de: 'Events', en: 'Events' },
  };
  let filterBar = `<div class="photo-filter-bar">`;
  for (const [key, label] of Object.entries(cats)) {
    filterBar += `<button class="photo-filter${key==='all'?' active':''}" onclick="filterPhotos('${key}',this)">${lang==='de'?label.de:label.en}</button>`;
  }
  filterBar += `</div>`;

  let grid = `<div class="photo-grid" id="photo-grid">`;
  for (const ph of PHOTOS) {
    grid += `<div class="photo-card" data-cat="${ph.category}" onclick="openLightbox(${JSON.stringify(ph.url)},${JSON.stringify(ph.title[lang]||ph.title.de)},${JSON.stringify(ph.desc[lang]||ph.desc.de)})">
      <img src="${ph.url}" alt="${ph.title[lang]||ph.title.de}" loading="lazy" onerror="this.parentElement.style.display='none'">
      <div class="photo-overlay"><span class="photo-title">${ph.title[lang]||ph.title.de}</span></div>
    </div>`;
  }
  grid += `</div>`;

  return `<div class="term-line">$ <span class="cmd">ls ${lang==='de'?'fotos':'photos'}/ --all</span></div>
    <div class="result-card" style="margin-bottom:8px;">
      <div class="rc-name">${lang==='de'?'Nomad Life — 31 Fotos':'Nomad Life — 31 Photos'}</div>
      <div class="rc-desc">${lang==='de'?'Aus dem Leben als digitaler Nomad — Natur, Lagerfeuer, Odin, Arbeit und KI-Art.':'From life as a digital nomad — nature, campfires, Odin, work and AI art.'}</div>
    </div>
    ${filterBar}
    ${grid}`;
}

function filterPhotos(cat, btn) {
  document.querySelectorAll('.photo-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#photo-grid .photo-card').forEach(card => {
    card.style.display = (cat === 'all' || card.dataset.cat === cat) ? '' : 'none';
  });
}

function openLightbox(url, title, desc) {
  const lb = document.getElementById('photo-lightbox');
  lb.querySelector('img').src = url;
  lb.querySelector('.lb-title').textContent = title;
  lb.querySelector('.lb-desc').textContent = desc;
  lb.classList.add('open');
}

function closeLightbox() {
  document.getElementById('photo-lightbox').classList.remove('open');
}

   CAMP — Nomads Land Community
   ============================================================ */
async function renderPreise() {
  const c = document.getElementById('win-content');
  const lang = document.documentElement.lang || 'de';
  c.innerHTML = `<div style="padding:8px 4px;"><div style="color:var(--text-dim);font-size:10px;margin-bottom:12px;">$ cat preise.json | jq '.[] | select(.visibility=="public")'</div><div id="preise-loading" style="color:var(--text-dim);font-size:11px;">Lade Preise...</div></div>`;
  try {
    const [prodRes, priceRes] = await Promise.all([
      fetch(`${SB_URL}/rest/v1/products?select=id,name,description_short,product_type&product_type=in.(consulting,einmalig,workshop)&status=eq.active`, {headers: SB_HEADERS}),
      fetch(`${SB_URL}/rest/v1/pricing?select=product_id,label,price,price_model,currency&visibility=eq.public`, {headers: SB_HEADERS})
    ]);
    const products = await prodRes.json();
    const pricing = await priceRes.json();

    // Preise mappen — nur Standard (kein Impact/Enterprise)
    const priceMap = {};
    for (const p of pricing) {
      const lbl = typeof p.label === 'object' ? (p.label.de || '') : String(p.label);
      if (!lbl.includes('Impact') && !lbl.includes('Enterprise')) {
        priceMap[p.product_id] = { price: p.price, model: p.price_model };
      }
    }

    const sections = [
      { type: 'consulting', icon: '💼', label_de: 'Beratung & Strategie', label_en: 'Consulting & Strategy' },
      { type: 'einmalig',   icon: '🔧', label_de: 'Projektleistungen',    label_en: 'Project Services' },
      { type: 'workshop',   icon: '🎓', label_de: 'Workshops & Training',  label_en: 'Workshops & Training' },
    ];

    let html = '<div style="padding:8px 4px;">';
    html += `<div style="color:var(--text-dim);font-size:10px;margin-bottom:12px;">$ cat preise.json | jq '.[] | select(.visibility=="public")'</div>`;

    for (const sec of sections) {
      const items = products.filter(p => p.product_type === sec.type);
      if (!items.length) continue;
      const secLabel = lang === 'en' ? sec.label_en : sec.label_de;
      html += `<div style="margin-bottom:14px;">`;
      html += `<div style="font-size:11px;font-weight:700;color:var(--teal);border-bottom:1px solid var(--card-border);padding-bottom:4px;margin-bottom:8px;">${sec.icon} ${secLabel}</div>`;
      for (const prod of items) {
        const name = typeof prod.name === 'object' ? (lang === 'en' ? prod.name.en : prod.name.de) : prod.name;
        const desc = typeof prod.description_short === 'object' ? (lang === 'en' ? prod.description_short.en : prod.description_short.de) : (prod.description_short || '');
        const priceInfo = priceMap[prod.id];
        const priceStr = priceInfo ? `${priceInfo.price.toLocaleString('de-DE')} EUR` : '—';
        const modelStr = priceInfo ? (priceInfo.model === 'einmalig' ? (lang === 'en' ? 'one-time' : 'einmalig') : priceInfo.model) : '';
        html += `<div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:6px;padding:8px 10px;margin-bottom:6px;">`;
        html += `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">`;
        html += `<div style="font-size:11px;font-weight:700;color:var(--text-strong);flex:1;">${name}</div>`;
        html += `<div style="font-size:11px;font-weight:700;color:var(--teal);white-space:nowrap;">${priceStr}<span style="font-size:9px;color:var(--text-dim);font-weight:400;"> ${modelStr}</span></div>`;
        html += `</div>`;
        if (desc) html += `<div style="font-size:9px;color:var(--text-dim);margin-top:3px;line-height:1.4;">${desc}</div>`;
        html += `</div>`;
      }
      html += `</div>`;
    }

    html += `<div style="font-size:9px;color:var(--text-dim);border-top:1px solid var(--card-border);padding-top:8px;margin-top:4px;">`;
    html += lang === 'en'
      ? '💬 Hourly rate on request: 100 EUR/h · Individual offers & funding advice: <a href="mailto:phil@holo-ver.se" style="color:var(--teal);">Book Discovery Call</a>'
      : '💬 Stundensatz auf Anfrage: 100 EUR/h · Individuelle Angebote & Fördermittelberatung: <a href="mailto:phil@holo-ver.se" style="color:var(--teal);">Discovery Call buchen</a>';
    html += `</div>`;
    html += '</div>';
    c.innerHTML = html;
  } catch(e) {
    c.innerHTML = `<div style="padding:16px;color:var(--text-dim);font-size:11px;">Fehler beim Laden der Preise.</div>`;
  }
}

/* ============================================================
   NAVIGATION
   ============================================================ */
const appPaths = {
  projekte:   { de: '~/os/projekte/', en: '~/os/projects/' },
  referenzen: { de: '~/os/referenzen/', en: '~/os/references/' },
  photos:     { de: '~/os/fotos/', en: '~/os/photos/' },
  privat:     { de: '~/os/privat/', en: '~/os/private/' },
  tools:      { de: '~/os/tools/', en: '~/os/tools/' },
  links:      { de: '~/os/links/', en: '~/os/links/' },
  youtube:    { de: '~/os/youtube/', en: '~/os/youtube/' },
  camp:       { de: '~/os/camp/', en: '~/os/camp/' },
  preise:     { de: '~/os/preise/', en: '~/os/pricing/' },
};

function openApp(id) {
  const win = document.getElementById('app-window');
  win.dataset.currentApp = id;
  document.getElementById('win-title').textContent = appPaths[id][lang];
  document.getElementById('win-content').setAttribute('data-app', id);
  win.classList.add('open');
  renderApp(id);
}

async function renderApp(id) {
  document.getElementById('win-title').textContent = appPaths[id]?.[lang] || `~/os/${id}/`;
  document.getElementById('win-content').setAttribute('data-app', id);
  const c = document.getElementById('win-content');
  switch(id) {
    case 'projekte':   await renderProjekte(); break;
    case 'referenzen': await renderReferenzen(); break;
    case 'links':      await renderLinks(); break;
    case 'photos':     c.innerHTML = renderPhotos(); break;
    case 'privat':     c.innerHTML = renderPrivat(); break;
    case 'tools':      c.innerHTML = renderTools(); break;
    case 'youtube':    c.innerHTML = renderYoutube(); break;
    case 'camp':       c.innerHTML = renderCamp(); break;
    case 'preise':     await renderPreise(); break;
  }
}

function closeApp() {
  document.getElementById('app-window').classList.remove('open');
}
</script>
